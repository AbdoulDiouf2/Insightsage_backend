worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # ─── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/vnd.ms-fontobject application/x-font-ttf font/opentype
             image/svg+xml image/x-icon;

  # ─── Logs ────────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ─── Upstreams ───────────────────────────────────────────────────────────────
  upstream api_upstream {
    server api:3000;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
  }

  # ─── HTTP — Certbot ACME challenge + redirect HTTPS ──────────────────────────
  server {
    listen 80;
    server_name _;

    # Certbot : validation du domaine Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS — cockpit.nafaka.tech ─────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name cockpit.nafaka.tech;

    # ─── SSL (Let's Encrypt via Certbot) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cockpit.nafaka.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cockpit.nafaka.tech/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ─── Security headers ────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           DENY                                   always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    client_max_body_size 10M;

    # ─── API REST (/api/) ─────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_read_timeout  60s;
      proxy_send_timeout  60s;
    }

    # ─── WebSocket Socket.io (/socket.io/) ───────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # ─── Frontend React SPA ──────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }
  }
}
