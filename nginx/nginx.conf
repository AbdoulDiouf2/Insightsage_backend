worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # ─── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/vnd.ms-fontobject application/x-font-ttf font/opentype
             image/svg+xml image/x-icon;

  # ─── Logs ────────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ─── Upstreams ───────────────────────────────────────────────────────────────
  upstream api_upstream {
    server api:3000;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
  }

  # ─── Server ──────────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ─── API REST ──────────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_read_timeout  60s;
      proxy_send_timeout  60s;
    }

    # ─── WebSocket Socket.io (/socket.io/) ────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # ─── Frontend React SPA ────────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }
  }

  # ─── HTTPS — décommenter quand les certificats SSL sont disponibles ──────────
  # server {
  #   listen 443 ssl;
  #   server_name votre-domaine.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   # Même config location que le bloc HTTP ci-dessus
  # }
}
