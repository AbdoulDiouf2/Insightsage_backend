name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C C:\Cockpit\repos\Insightsage_backend pull origin main

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: C:\Cockpit\repos\Insightsage_backend

      - name: Build
        run: npm run build
        working-directory: C:\Cockpit\repos\Insightsage_backend

      - name: Reload PM2
        run: C:\Users\LAMARANA\AppData\Roaming\npm\pm2.cmd reload cockpit-api